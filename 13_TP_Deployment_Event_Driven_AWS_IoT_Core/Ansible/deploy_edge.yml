- name: "deploy Edge-Gateway services"
  hosts: edge
  become: true
  vars_files:
    - vars.yml

  pre_tasks:
    - name: Install docker compose plugin
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present
        update_cache: yes

    - name: Install mosquitto clients
      ansible.builtin.apt:
        name: mosquitto-clients
        state: present
        update_cache: yes


  tasks:

    # -------------------------------
    # Directories
    # -------------------------------
    - name: Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - /home/vagrant/edge-stack
        - /home/vagrant/edge-stack/secrets
        - /home/vagrant/certs
    # -------------------------------
    # Permissions
    # -------------------------------
    - name: Fix InfluxDB permissions
      file:
        path: /home/vagrant/data/influxdb
        owner: 1000
        group: 1000
        recurse: yes

    - name: Fix Grafana permissions
      file:
        path: /home/vagrant/data/grafana
        owner: 472
        group: 472
        recurse: yes

    - name: Fix MQTT listener permissions
      file:
        path: /home/vagrant/certs
        owner: vagrant
        group: vagrant
        mode: '0700'


    # -------------------------------
    # Clone project
    # -------------------------------

    - name: Check if repo exists
      stat:
        path: /home/vagrant/edge-stack/.git
      register: git_repo

    - name: Remove invalid directory
      file:
        path: /home/vagrant/edge-stack
        state: absent
      when: not git_repo.stat.exists

    - name: Add github to known hosts
      known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan github.com') }}"
        path: /home/vagrant/.ssh/known_hosts
      become_user: vagrant

    - name: Fix git safe directory
      command: git config --global --add safe.directory /home/vagrant/edge-stack
      become_user: vagrant    

    - name: Fix SSH key permissions
      file:
        path: /home/vagrant/.ssh/id_ed25519
        owner: vagrant
        group: vagrant
        mode: '0600'

    - name: Clone or update project repository
      git:
        repo: "{{ git_repo_url }}"
        dest: /home/vagrant/edge-stack
        version: main
        key_file: /home/vagrant/.ssh/id_ed25519
        accept_hostkey: yes
        force: yes
      become_user: vagrant

    - name: Ensure ownership is correct
      file:
        path: /home/vagrant/edge-stack
        owner: vagrant
        group: vagrant
        recurse: yes
    


    # -------------------------------
    # Secrets (restent côté Ansible)
    # -------------------------------
    - name: Copy secrets
      copy:
        src: ./files/secrets/influx_token.txt
        dest: /home/vagrant/edge-stack/secrets/influx_token.txt
        owner: root
        group: root
        mode: '0444'

    # -------------------------------
    # Copy AWS certs 
    # -------------------------------
    - name: Copy AWS Root CA
      copy:
        src: ./files/certs/root-CA.crt
        dest: /home/vagrant/certs/root-CA.crt
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Copy AWS device cert
      copy:
        src: ./files/certs/vagrant-edge-device.cert.pem
        dest: /home/vagrant/certs/vagrant-edge-device.cert.pem
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Copy AWS private key
      copy:
        src: ./files/certs/vagrant-edge-device.private.key
        dest: /home/vagrant/certs/vagrant-edge-device.private.key
        owner: vagrant
        group: vagrant
        mode: '0600'

    # -------------------------------
    # ENV (infra → ansible)
    # -------------------------------
    - name: Deploy .env file
      template:
        src: .env.j2
        dest: /home/vagrant/edge-stack/.env
        owner: vagrant
        group: vagrant
        mode: '0600'

    # -------------------------------
    # deploy script
    # -------------------------------
    - name:  Deploy deploy script
      copy:
        src: ./files/deploy.sh
        dest: /home/vagrant/deploy.sh
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: deploy mqtt listener script
      copy:
        src: ./files/mqtt_listener.sh
        dest: /home/vagrant/mqtt_listener.sh
        owner: vagrant
        group: vagrant
        mode: '0755'

    # -------------------------------
    # systemd
    # -------------------------------
    - name: Deploy systemd service
      copy:
        src: ./files/mqtt_listener.service
        dest: /etc/systemd/system/mqtt_listener.service

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Enable mqtt listener service
      systemd:
        name: mqtt_listener.service
        enabled: yes

    - name: Start mqtt listener service
      systemd:
        name: mqtt_listener.service
        state: started

    # -------------------------------
    # First run ONLY
    # -------------------------------
    - name: Initial docker compose up
      command: docker compose up -d --build
      args:
        chdir: /home/vagrant/edge-stack